server {
    listen 80;
    server_name 148.230.79.29;

    # Proxy all API requests to the Spring Boot backend
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow uploads up to 10 MB (product images etc.)
        client_max_body_size 10m;
    }

    # Serve uploaded files directly via Nginx (optional optimisation —
    # comment out if you prefer to serve them through Spring Boot)
    # location /uploads/ {
    #     alias /home/sandile/hustle-backend/uploads/;
    # }

    # Block all other paths — the frontend is on Netlify
    location / {
        return 404;
    }
}
