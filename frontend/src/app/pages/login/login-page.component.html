<div class="login-page">

  <mat-tab-group mat-stretch-tabs="true" animationDuration="200ms" class="login-tabs">

    <!-- ── Login Tab ─────────────────────────────── -->
    <mat-tab label="Login">
      <form class="auth-form" (ngSubmit)="onLogin()" #loginForm="ngForm">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Phone number</mat-label>
          <mat-icon matPrefix>phone</mat-icon>
          <input
            matInput
            type="tel"
            placeholder="e.g. 0812345678"
            [(ngModel)]="loginPhone"
            name="loginPhone"
            required
            autocomplete="tel"
          />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <mat-icon matPrefix>lock</mat-icon>
          <input
            matInput
            [type]="hideLoginPwd ? 'password' : 'text'"
            [(ngModel)]="loginPassword"
            name="loginPassword"
            required
            autocomplete="current-password"
          />
          <button type="button" mat-icon-button matSuffix (click)="hideLoginPwd = !hideLoginPwd">
            <mat-icon>{{ hideLoginPwd ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <p *ngIf="loginError" class="auth-error">{{ loginError }}</p>

        <button
          type="submit"
          mat-flat-button
          class="auth-submit-btn"
          [disabled]="loginLoading()"
        >
          <mat-spinner *ngIf="loginLoading()" diameter="20" class="btn-spinner"></mat-spinner>
          <span *ngIf="!loginLoading()">Login</span>
        </button>

      </form>
    </mat-tab>

    <!-- ── Register Tab ───────────────────────────── -->
    <mat-tab label="Create Account">
      <form class="auth-form" (ngSubmit)="onRegister()" #regForm="ngForm">

        <div class="name-row">
          <mat-form-field appearance="outline" class="half-width">
            <mat-label>First name</mat-label>
            <input matInput [(ngModel)]="regFirstName" name="regFirstName" required autocomplete="given-name" />
          </mat-form-field>
          <mat-form-field appearance="outline" class="half-width">
            <mat-label>Last name</mat-label>
            <input matInput [(ngModel)]="regLastName" name="regLastName" required autocomplete="family-name" />
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Phone number</mat-label>
          <mat-icon matPrefix>phone</mat-icon>
          <input
            matInput
            type="tel"
            placeholder="e.g. 0812345678"
            [(ngModel)]="regPhone"
            name="regPhone"
            required
            autocomplete="tel"
          />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email (optional)</mat-label>
          <mat-icon matPrefix>email</mat-icon>
          <input matInput type="email" [(ngModel)]="regEmail" name="regEmail" autocomplete="email" placeholder="e.g. name@gmail.com" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <mat-icon matPrefix>lock</mat-icon>
          <input
            matInput
            [type]="hideRegPwd ? 'password' : 'text'"
            [(ngModel)]="regPassword"
            name="regPassword"
            required
            autocomplete="new-password"
          />
          <button type="button" mat-icon-button matSuffix (click)="hideRegPwd = !hideRegPwd">
            <mat-icon>{{ hideRegPwd ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Confirm password</mat-label>
          <mat-icon matPrefix>lock_reset</mat-icon>
          <input
            matInput
            [type]="hideRegPwd ? 'password' : 'text'"
            [(ngModel)]="regConfirm"
            name="regConfirm"
            required
            autocomplete="new-password"
          />
        </mat-form-field>

        <p *ngIf="regError" class="auth-error">{{ regError }}</p>

        <button
          type="submit"
          mat-flat-button
          class="auth-submit-btn"
          [disabled]="regLoading()"
        >
          <mat-spinner *ngIf="regLoading()" diameter="20" class="btn-spinner"></mat-spinner>
          <span *ngIf="!regLoading()">Create Account</span>
        </button>

      </form>
    </mat-tab>

  </mat-tab-group>

</div>
