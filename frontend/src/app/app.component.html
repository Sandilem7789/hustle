<header class="site-header">
  <div class="brand">
    <span class="logo">🎛️</span>
    <div>
      <p class="eyebrow">Hustle Economy</p>
      <strong>KwaZulu-Natal</strong>
    </div>
  </div>
  <nav>
    <ng-container *ngIf="!auth.isLoggedIn()">
      <a routerLink="/register" routerLinkActive="active">Register</a>
    </ng-container>
    <ng-container *ngIf="auth.isLoggedIn()">
      <a routerLink="/dashboard" routerLinkActive="active">My Dashboard</a>
      <span class="user-name">{{ auth.state()?.firstName }}</span>
      <button class="logout-btn" (click)="logout()">Logout</button>
    </ng-container>
    <a routerLink="/facilitator" routerLinkActive="active">Facilitator</a>
    <a routerLink="/marketplace" routerLinkActive="active">Marketplace</a>
  </nav>
</header>

<main class="page-shell">
  <router-outlet></router-outlet>
</main>
