<!-- Site Header -->
<header class="site-header">
  <!-- Logo — links back to marketplace (home) -->
  <a routerLink="/marketplace" class="site-logo-link" aria-label="Hustle Economy — home">
    <img
      src="15a6d06d-8e5f-477f-965f-5c33f94a6858.jpg"
      alt="Hustle Economy — SizoPopa Sonke One Dy!"
      class="site-logo"
    />
  </a>

  <!-- Desktop-only nav links -->
  <nav class="desktop-nav">
    <a routerLink="/marketplace" routerLinkActive="active">🛒 Marketplace</a>
    <ng-container *ngIf="showDashboardNav()">
      <a routerLink="/dashboard" routerLinkActive="active">📊 Dashboard</a>
      <a routerLink="/facilitator" routerLinkActive="active">🏛️ Facilitator</a>
      <button type="button" class="nav-logout-btn" (click)="logout()">Logout</button>
    </ng-container>
    <ng-container *ngIf="!showDashboardNav()">
      <a routerLink="/facilitator" routerLinkActive="active">🏛️ Facilitator</a>
      <a routerLink="/coordinator" routerLinkActive="active">🗂️ Coordinator</a>
      <a routerLink="/register" routerLinkActive="active">Register / Login</a>
      <ng-container *ngIf="customerAuth.isLoggedIn()">
        <a routerLink="/orders" routerLinkActive="active">📦 Orders</a>
      </ng-container>
      <ng-container *ngIf="!customerAuth.isLoggedIn()">
        <a routerLink="/customer/login" routerLinkActive="active">Customer Login</a>
      </ng-container>
    </ng-container>
  </nav>
</header>

<!-- Offline Banner -->
<app-offline-banner></app-offline-banner>

<!-- Main Content -->
<main class="page-shell">
  <router-outlet></router-outlet>
</main>

<!-- Bottom Navigation (mobile only) — 5 fixed tabs -->
<nav class="bottom-nav">
  <a routerLink="/marketplace" routerLinkActive="active" class="bottom-nav-item">
    <span class="bottom-nav-icon">🛒</span>
    <span>Market</span>
  </a>

  <a routerLink="/dashboard" routerLinkActive="active" class="bottom-nav-item">
    <span class="bottom-nav-icon">👤</span>
    <span>Hustler</span>
  </a>

  <a routerLink="/facilitator" routerLinkActive="active" class="bottom-nav-item">
    <span class="bottom-nav-icon">🏛️</span>
    <span>Facilitator</span>
  </a>

  <a routerLink="/coordinator" routerLinkActive="active" class="bottom-nav-item">
    <span class="bottom-nav-icon">🗂️</span>
    <span>Coordinator</span>
  </a>

  <a routerLink="/operations" routerLinkActive="active" class="bottom-nav-item">
    <span class="bottom-nav-icon">🗺️</span>
    <span>Operations</span>
  </a>
</nav>
