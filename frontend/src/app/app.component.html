<!-- Site Header -->
<header class="site-header">
  <!-- Logo — links back to marketplace (home) -->
  <a routerLink="/marketplace" class="site-logo-link" aria-label="Hustle Economy — home">
    <img
      src="15a6d06d-8e5f-477f-965f-5c33f94a6858.jpg"
      alt="Hustle Economy — SizoPopa Sonke One Dy!"
      class="site-logo"
    />
  </a>

  <!-- Desktop nav — same 5 tabs as mobile bottom nav -->
  <nav class="desktop-nav">
    <a routerLink="/marketplace" routerLinkActive="active" class="desktop-tab">
      <span class="desktop-tab-icon">🛒</span>
      <span class="desktop-tab-label">Market</span>
    </a>

    <a routerLink="/dashboard" routerLinkActive="active"
       class="desktop-tab" [class.dimmed]="!canHustler()">
      <span class="desktop-tab-icon">
        👤<span *ngIf="!canHustler()" class="lock-badge">🔒</span>
      </span>
      <span class="desktop-tab-label">Hustler</span>
    </a>

    <a routerLink="/facilitator" routerLinkActive="active"
       class="desktop-tab" [class.dimmed]="!canFacilitator()">
      <span class="desktop-tab-icon">
        🏛️<span *ngIf="!canFacilitator()" class="lock-badge">🔒</span>
      </span>
      <span class="desktop-tab-label">Facilitator</span>
    </a>

    <a routerLink="/coordinator" routerLinkActive="active"
       class="desktop-tab" [class.dimmed]="!canCoordinator()">
      <span class="desktop-tab-icon">
        🗂️<span *ngIf="!canCoordinator()" class="lock-badge">🔒</span>
      </span>
      <span class="desktop-tab-label">Coordinator</span>
    </a>

    <a routerLink="/operations" routerLinkActive="active"
       class="desktop-tab" [class.dimmed]="!canOperations()">
      <span class="desktop-tab-icon">
        🗺️<span *ngIf="!canOperations()" class="lock-badge">🔒</span>
      </span>
      <span class="desktop-tab-label">Operations</span>
    </a>

    <button *ngIf="auth.isLoggedIn()" type="button" class="nav-logout-btn" (click)="logout()">
      Logout
    </button>
  </nav>
</header>

<!-- Offline Banner -->
<app-offline-banner></app-offline-banner>

<!-- Main Content -->
<main class="page-shell">
  <router-outlet></router-outlet>
</main>

<!-- Bottom Navigation (mobile only) — 5 fixed tabs -->
<nav class="bottom-nav">
  <a routerLink="/marketplace" routerLinkActive="active" class="bottom-nav-item">
    <span class="bottom-nav-icon">🛒</span>
    <span>Market</span>
  </a>

  <a routerLink="/dashboard" routerLinkActive="active"
     class="bottom-nav-item" [class.dimmed]="!canHustler()">
    <span class="bottom-nav-icon">
      👤<span *ngIf="!canHustler()" class="lock-badge">🔒</span>
    </span>
    <span>Hustler</span>
  </a>

  <a routerLink="/facilitator" routerLinkActive="active"
     class="bottom-nav-item" [class.dimmed]="!canFacilitator()">
    <span class="bottom-nav-icon">
      🏛️<span *ngIf="!canFacilitator()" class="lock-badge">🔒</span>
    </span>
    <span>Facilitator</span>
  </a>

  <a routerLink="/coordinator" routerLinkActive="active"
     class="bottom-nav-item" [class.dimmed]="!canCoordinator()">
    <span class="bottom-nav-icon">
      🗂️<span *ngIf="!canCoordinator()" class="lock-badge">🔒</span>
    </span>
    <span>Coordinator</span>
  </a>

  <a routerLink="/operations" routerLinkActive="active"
     class="bottom-nav-item" [class.dimmed]="!canOperations()">
    <span class="bottom-nav-icon">
      🗺️<span *ngIf="!canOperations()" class="lock-badge">🔒</span>
    </span>
    <span>Operations</span>
  </a>
</nav>
