server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Service worker must be served with no-cache so updates propagate immediately
  location = /ngsw-worker.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # ngsw.json state file — also no cache
  location = /ngsw.json {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Web manifest
  location = /manifest.webmanifest {
    add_header Content-Type "application/manifest+json";
    add_header Cache-Control "public, max-age=86400";
  }

  # API proxy to backend
  location /api/ {
    proxy_pass http://backend:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
  }

  # Angular app — SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }

  # Static assets — long cache (hashed filenames)
  location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
