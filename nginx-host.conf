# Host-level Nginx config for HTTPS termination on the VPS.
# Place this file at /etc/nginx/sites-available/hustle and symlink to sites-enabled.
#
# Prerequisites:
#   1. Install Nginx on the VPS:       sudo apt install -y nginx
#   2. Install Certbot:                sudo apt install -y certbot python3-certbot-nginx
#   3. Get a cert (replace domain):    sudo certbot --nginx -d yourdomain.co.za
#      Certbot will fill in the ssl_certificate paths automatically.
#
# After setup, restart Nginx:         sudo systemctl reload nginx

server {
    listen 80;
    server_name yourdomain.co.za;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yourdomain.co.za;

    # Certbot will populate these paths when you run it
    ssl_certificate     /etc/letsencrypt/live/yourdomain.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.co.za/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy everything to the Docker frontend container on port 4173
    location / {
        proxy_pass         http://127.0.0.1:4173;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
