# Host-level Nginx config for the VPS.
# Place this file at /etc/nginx/sites-available/hustle and symlink to sites-enabled.
#
# Prerequisites:
#   1. Install Nginx:   sudo apt install -y nginx
#   2. Copy config:     sudo cp nginx-host.conf /etc/nginx/sites-available/hustle
#   3. Enable site:     sudo ln -s /etc/nginx/sites-available/hustle /etc/nginx/sites-enabled/hustle
#   4. Remove default:  sudo rm -f /etc/nginx/sites-enabled/default
#   5. Test & reload:   sudo nginx -t && sudo systemctl reload nginx
#
# Port 8080 must remain CLOSED on the firewall — backend is internal only.
# Netlify proxies /api/* to this server on port 80; Nginx routes it to the backend.

server {
    listen 80;
    server_name _;

    # API requests from Netlify — proxy directly to the backend container.
    # Do NOT redirect these to HTTPS; Netlify already provides TLS to the browser.
    location /api/ {
        proxy_pass         http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Basic rate limiting — protect against brute-force on auth endpoints.
        # (Requires a limit_req_zone defined in nginx.conf or http block; skip if not set.)
        # limit_req zone=api burst=20 nodelay;
    }

    # Redirect all other HTTP traffic to HTTPS (legacy Docker frontend on port 4173).
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    # Certbot will populate these paths when you run it against a real domain.
    # If using a self-signed cert for now, replace with your cert paths.
    ssl_certificate     /etc/letsencrypt/live/yourdomain.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.co.za/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy to the Docker frontend container (legacy / direct VPS access).
    location / {
        proxy_pass         http://127.0.0.1:4173;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
