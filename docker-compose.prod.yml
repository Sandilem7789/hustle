services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hustle}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hustle_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-hustle}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PORT: 8080
      STAFF_PHONE: ${STAFF_PHONE}
      STAFF_PASSWORD: ${STAFF_PASSWORD}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - hustle_internal
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hustle-api.rule=Host(`srv1144757.hstgr.cloud`) && PathPrefix(`/api/`)"
      - "traefik.http.routers.hustle-api.entrypoints=websecure"
      - "traefik.http.routers.hustle-api.tls=true"
      - "traefik.http.routers.hustle-api.tls.certresolver=mytlschallenge"
      - "traefik.http.services.hustle-api.loadbalancer.server.port=8080"

networks:
  hustle_internal:
    internal: true
  traefik_public:
    external: true
    name: root_default

volumes:
  postgres_data:
  uploads_data:
